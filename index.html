<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLOTH TEMPLE</title>
<style>
  html,body { margin:0; padding:0; background:#020503;
    font-family:'Courier New',monospace; color:#9fd8a8;
    height:100%; overflow:hidden; }
  #crt { pointer-events:none; position:fixed; inset:0; z-index:5;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0.2) 0px,
    rgba(0,0,0,0.2) 1px, transparent 2px, transparent 4px); }
  #splash { position:fixed; inset:0; z-index:200; background:#000;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; cursor:pointer; }
  #splash img { pointer-events:none; width:100%; height:100%; object-fit:cover; opacity:0.85; }
  #splash-texte { pointer-events:none; position:absolute; bottom:8%;
    font-family:'Courier New',monospace; color:#ccc;
    font-size:clamp(12px,2.5vw,18px); letter-spacing:6px;
    animation:clignoter 1.4s infinite; }
  @keyframes clignoter { 0%,100%{opacity:1} 50%{opacity:0} }
  #menu { position:fixed; inset:0; z-index:10; display:none;
    flex-direction:column; align-items:center;
    justify-content:center; padding:20px; box-sizing:border-box;
    background:radial-gradient(ellipse at 50% 60%, #0a1f10 0%, #020503 70%); }
  #logo { width:clamp(220px,55%,420px); margin-bottom:32px;
    filter:drop-shadow(0 0 24px rgba(80,60,20,0.8)); }
  #sous-titre { font-size:clamp(9px,2vw,12px); letter-spacing:5px;
    color:#4a6a50; margin-bottom:48px; }
  #niveaux { display:flex; flex-direction:column; gap:12px; width:min(380px,90vw); }
  .niveau-btn { background:rgba(10,24,14,0.8); border:1px solid #2a4a34;
    color:#cfe8cf; font-family:'Courier New',monospace;
    font-size:clamp(11px,2.5vw,14px); letter-spacing:2px;
    padding:16px 20px; cursor:pointer; text-align:left;
    display:flex; justify-content:space-between; align-items:center; }
  .niveau-btn:hover { border-color:#bfffc8; box-shadow:0 0 14px rgba(120,255,140,0.25); }
  .niveau-btn:active { background:rgba(30,70,40,0.8); }
  .niveau-btn .num { color:#4a6a50; font-size:10px; letter-spacing:3px; }
  .niveau-btn .titre { flex:1; padding:0 16px; }
  .niveau-btn .statut { font-size:9px; color:#3a5a40; letter-spacing:2px; }
  #footer { margin-top:40px; font-size:9px; letter-spacing:3px; color:#2a3a2a; }
</style>
</head>
<body>
<audio id="musique-intro" src="intro.mp3" loop preload="auto"></audio>
<div id="crt"></div>

<div id="splash">
  <img src="slothsleep.png" alt="Somnul">
  <div id="splash-texte">TOUCHE POUR ENTRER</div>
</div>

<div id="menu">
  <img id="logo" src="logo.png" alt="SLOTH TEMPLE">
  <div id="sous-titre">CHOISIR LE RITE — 199X</div>
  <div id="niveaux">
    <button class="niveau-btn" onclick="lancerNiveau('niveau1.html')">
      <span class="num">01</span>
      <span class="titre">CREATION OF A SLOTH</span>
      <span class="statut">JOUER →</span>
    </button>
    <button class="niveau-btn" onclick="lancerNiveau('niveau2.html')">
      <span class="num">02</span>
      <span class="titre">THE TEMPLE</span>
      <span class="statut">BIENTÔT</span>
    </button>
    <button class="niveau-btn" onclick="lancerNiveau('niveau3.html')">
      <span class="num">03</span>
      <span class="titre">SHA'UR'NA</span>
      <span class="statut">BIENTÔT</span>
    </button>
    <button class="niveau-btn" onclick="lancerNiveau('niveau4.html')">
      <span class="num">04</span>
      <span class="titre">SOMNUL RISE</span>
      <span class="statut">BIENTÔT</span>
    </button>
    <button class="niveau-btn" onclick="lancerNiveau('niveau5.html')">
      <span class="num">05</span>
      <span class="titre">THE GREAT OLD SLOTH</span>
      <span class="statut">BIENTÔT</span>
    </button>
  </div>
  <div id="footer">SLOTH TEMPLE — TOUS LES RIFFS RÉSERVÉS</div>
</div>

<script>
const splash = document.getElementById('splash');
const menu = document.getElementById('menu');
const musique = document.getElementById('musique-intro');

splash.addEventListener('click', ()=>{
  musique.play().catch(()=>{});
  splash.style.display='none';
  menu.style.display='flex';
});

function lancerNiveau(url){
  musique.pause();
  musique.currentTime=0;
  window.location.href=url;
}
</script>
</body>
</html>
